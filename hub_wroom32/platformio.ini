[platformio]
default_envs = wroom32_hub

; ============================================================
;  HUB — ESP32 WROOM-32
;  Receives vibration state from XIAO ESP32-C6 via ESP-NOW
;  Reads indoor temp/humidity from BME280
;  Tracks HVAC cycle timing and publishes to HiveMQ Cloud
; ============================================================
[env:wroom32_hub]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_port   = /dev/cu.usbserial-0001
monitor_port  = /dev/cu.usbserial-0001

; Build flags:
;   -DI2C_SCAN   → enable I2C bus scanner on boot (useful during initial wiring)
;                  remove this flag once BME280 is confirmed working
build_flags =
    ; -DI2C_SCAN  ; uncomment to re-enable I2C scanner on boot for debugging
    -DOTA_GITHUB_USER=\"dditzler\"
    -DOTA_GITHUB_REPO=\"ernie\"
    -DOTA_VERSION_PATH=\"/dditzler/ernie/main/hub-version.json\"
    -DOTA_CHECK_INTERVAL_S=3600

lib_deps =
    adafruit/Adafruit BMP280 Library @ ^2.2.4
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    knolleary/PubSubClient @ ^2.8
    arduino-libraries/ArduinoHttpClient @ ^0.6.1
