<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vacation Home — Temperature Monitor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    color: #1a202c;
  }

  .card {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 40px 48px;
    width: 100%;
    max-width: 520px;
    text-align: center;
  }

  .property-name {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #718096;
    margin-bottom: 6px;
  }

  .location {
    font-size: 18px;
    font-weight: 600;
    color: #2d3748;
    margin-bottom: 32px;
  }

  .status-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    margin-bottom: 36px;
  }

  .status-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #cbd5e0;
    flex-shrink: 0;
    transition: background 0.4s;
  }
  .status-dot.online  { background: #48bb78; box-shadow: 0 0 0 3px rgba(72,187,120,0.2); }
  .status-dot.offline { background: #f56565; }
  .status-dot.waiting { background: #ed8936; animation: pulse 1.4s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  .status-label { font-size: 13px; font-weight: 500; color: #718096; }

  /* ── Two-column temp layout ── */
  .temps-row {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    margin-bottom: 12px;
  }

  .temp-col { flex: 3; padding: 0 16px; }          /* inside = 60% */
  .temp-col.outside { flex: 2; }                   /* outside = 40% */
  .temp-col + .temp-col { border-left: 1px solid #edf2f7; }

  .temp-col.outside .temp-value { font-size: 48px; letter-spacing: -2px; }
  .temp-col.outside .temp-unit  { font-size: 20px; }

  .temp-col-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #a0aec0;
    margin-bottom: 8px;
  }

  .temp-value {
    font-size: 72px;
    font-weight: 200;
    letter-spacing: -3px;
    color: #1a202c;
    line-height: 1;
    transition: color 0.4s;
  }
  .temp-value.cold    { color: #4299e1; }
  .temp-value.warm    { color: #ed8936; }
  .temp-value.hot     { color: #f56565; }
  .temp-value.waiting { color: #cbd5e0; }

  .temp-unit {
    font-size: 28px;
    font-weight: 300;
    color: #a0aec0;
    vertical-align: super;
    line-height: 0;
    margin-left: 2px;
  }

  .last-updated { font-size: 12px; color: #a0aec0; margin-bottom: 32px; min-height: 18px; }

  .divider { height: 1px; background: #edf2f7; margin: 0 -48px 28px; }

  /* ── Hi/Lo section ── */
  .hilo-section { display: flex; }

  .hilo-col { flex: 1; padding: 0 16px; }
  .hilo-col + .hilo-col { border-left: 1px solid #edf2f7; }

  .hilo-col-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #a0aec0;
    margin-bottom: 12px;
  }

  .hilo-row { display: flex; justify-content: center; gap: 24px; }
  .hilo-item { text-align: center; }

  .hilo-temp { font-size: 26px; font-weight: 300; color: #2d3748; }
  .hilo-temp.hi    { color: #e53e3e; }
  .hilo-temp.lo    { color: #3182ce; }
  .hilo-temp.empty { color: #cbd5e0; }

  .hilo-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #a0aec0;
    margin-top: 3px;
  }

  .daily-date { font-size: 11px; color: #a0aec0; margin-top: 10px; }

  .footer { margin-top: 28px; font-size: 11px; color: #a0aec0; }
</style>
</head>
<body>

<div class="card">
  <div class="property-name">Vacation Home</div>
  <div class="location">Illinois — Chicago Area</div>

  <div class="status-row">
    <div class="status-dot waiting" id="dot"></div>
    <span class="status-label" id="status-label">Connecting…</span>
  </div>

  <div class="temps-row">
    <div class="temp-col">
      <div class="temp-col-label">Inside</div>
      <div>
        <span class="temp-value waiting" id="temp-inside">--</span><span class="temp-unit">°F</span>
      </div>
    </div>
    <div class="temp-col outside">
      <div class="temp-col-label">Outside</div>
      <div>
        <span class="temp-value waiting" id="temp-outside">--</span><span class="temp-unit">°F</span>
      </div>
    </div>
  </div>
  <div class="last-updated" id="last-updated"></div>

  <div class="divider"></div>

  <div class="hilo-section">
    <div class="hilo-col">
      <div class="hilo-col-label">Today's Indoor Range</div>
      <div class="hilo-row">
        <div class="hilo-item">
          <div class="hilo-temp hi empty" id="hi-temp">--</div>
          <div class="hilo-label">High</div>
        </div>
        <div class="hilo-item">
          <div class="hilo-temp lo empty" id="lo-temp">--</div>
          <div class="hilo-label">Low</div>
        </div>
      </div>
    </div>
    <div class="hilo-col">
      <div class="hilo-col-label">Forecast</div>
      <div class="hilo-row">
        <div class="hilo-item">
          <div class="hilo-temp hi empty" id="wx-hi">--</div>
          <div class="hilo-label">High</div>
        </div>
        <div class="hilo-item">
          <div class="hilo-temp lo empty" id="wx-lo">--</div>
          <div class="hilo-label">Low</div>
        </div>
      </div>
    </div>
  </div>
  <div class="daily-date" id="daily-date"></div>
</div>

<div class="footer">Indoor sensor updates every 10s · Weather updates every 15 min</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const BROKER       = 'broker.hivemq.com';
const PORT         = 8884;
const PROTOCOL     = 'wss';
const TOPIC_STATUS = 'vacation/cust1/il/temp/status';
const TOPIC_DAILY  = 'vacation/cust1/il/temp/daily';
const OFFLINE_MS   = 5 * 60 * 1000;

// ZIP 60631 — Chicago NW side
const WX_URL = 'https://api.open-meteo.com/v1/forecast'
  + '?latitude=41.9917&longitude=-87.8093'
  + '&current=temperature_2m'
  + '&daily=temperature_2m_max,temperature_2m_min'
  + '&temperature_unit=fahrenheit'
  + '&timezone=America%2FChicago';

// ── State ──────────────────────────────────────────────────────────────────
let lastMsgTime = null;
let offlineTimer = null;

// ── Helpers ────────────────────────────────────────────────────────────────
function setStatus(state, text) {
  document.getElementById('dot').className = 'status-dot ' + state;
  document.getElementById('status-label').textContent = text;
}

function tempColor(f) {
  if (f < 50) return 'cold';
  if (f < 75) return '';
  if (f < 85) return 'warm';
  return 'hot';
}

function timeAgo(ms) {
  const s = Math.round((Date.now() - ms) / 1000);
  if (s < 5)  return 'just now';
  if (s < 60) return `${s}s ago`;
  return `${Math.round(s / 60)}m ago`;
}

function updateLastSeen() {
  if (!lastMsgTime) return;
  document.getElementById('last-updated').textContent = 'Updated ' + timeAgo(lastMsgTime);
}
setInterval(updateLastSeen, 10000);

// ── Weather (Open-Meteo, no API key required) ──────────────────────────────
async function fetchWeather() {
  try {
    const res  = await fetch(WX_URL);
    const data = await res.json();
    const cur  = data.current.temperature_2m;
    const hi   = data.daily.temperature_2m_max[0];
    const lo   = data.daily.temperature_2m_min[0];

    const outEl = document.getElementById('temp-outside');
    outEl.textContent = cur.toFixed(1);
    outEl.className = 'temp-value ' + tempColor(cur);

    const hiEl = document.getElementById('wx-hi');
    hiEl.textContent = hi.toFixed(1);
    hiEl.className = 'hilo-temp hi';

    const loEl = document.getElementById('wx-lo');
    loEl.textContent = lo.toFixed(1);
    loEl.className = 'hilo-temp lo';
  } catch(e) {
    document.getElementById('temp-outside').textContent = '--';
  }
}

fetchWeather();
setInterval(fetchWeather, 15 * 60 * 1000);

// ── MQTT ───────────────────────────────────────────────────────────────────
const clientId = 'dashboard-' + Math.random().toString(36).slice(2, 8);
const client = mqtt.connect(`${PROTOCOL}://${BROKER}:${PORT}/mqtt`, {
  clientId, clean: true, reconnectPeriod: 5000,
});

client.on('connect', () => {
  setStatus('online', 'Connected — waiting for data');
  client.subscribe([TOPIC_STATUS, TOPIC_DAILY]);
});
client.on('reconnect', () => setStatus('waiting', 'Reconnecting…'));
client.on('offline',   () => setStatus('offline',  'Offline'));
client.on('error',     () => setStatus('offline',  'Connection error'));

client.on('message', (topic, raw) => {
  let data;
  try { data = JSON.parse(raw.toString()); } catch { return; }

  if (topic === TOPIC_STATUS) {
    const f = data.temp_f;
    if (typeof f !== 'number') return;

    const el = document.getElementById('temp-inside');
    el.textContent = f.toFixed(1);
    el.className = 'temp-value ' + tempColor(f);

    setStatus('online', 'Online');
    lastMsgTime = Date.now();
    updateLastSeen();

    clearTimeout(offlineTimer);
    offlineTimer = setTimeout(() => {
      setStatus('offline', 'Sensor offline');
      document.getElementById('temp-inside').className = 'temp-value waiting';
    }, OFFLINE_MS);
  }

  if (topic === TOPIC_DAILY) {
    const hi = data.hi_f, lo = data.lo_f;
    if (typeof hi === 'number') {
      const el = document.getElementById('hi-temp');
      el.textContent = hi.toFixed(1);
      el.className = 'hilo-temp hi';
    }
    if (typeof lo === 'number') {
      const el = document.getElementById('lo-temp');
      el.textContent = lo.toFixed(1);
      el.className = 'hilo-temp lo';
    }
    if (data.date) {
      const d = new Date(data.date + 'T12:00:00');
      document.getElementById('daily-date').textContent =
        d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
    }
  }
});
</script>
</body>
</html>
