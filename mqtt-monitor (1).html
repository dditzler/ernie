<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MQTT Monitor</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #22263a;
    --border: #2e3347;
    --text: #e2e4f0;
    --muted: #6b7094;
    --accent: #4f9eff;
    --green: #3ecf8e;
    --amber: #f59e0b;
    --red: #f87171;
    --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
    --sans: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; min-height: 100vh; }

  header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }
  .logo { font-family: var(--mono); font-size: 13px; font-weight: 600; letter-spacing: 0.08em; color: var(--accent); }
  .logo span { color: var(--muted); font-weight: 400; }
  .status-pill {
    margin-left: auto; display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-family: var(--mono); padding: 4px 10px;
    border-radius: 20px; border: 1px solid var(--border); color: var(--muted);
    background: var(--bg3); transition: all 0.3s;
  }
  .status-pill.connected { border-color: var(--green); color: var(--green); }
  .status-pill.connecting { border-color: var(--amber); color: var(--amber); }
  .status-pill.error { border-color: var(--red); color: var(--red); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .dot.pulse { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .layout { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 53px); }

  .sidebar {
    background: var(--bg2); border-right: 1px solid var(--border);
    padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto;
  }
  .section-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
  }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; color: var(--muted); }
  .field input {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: var(--mono); font-size: 12px;
    padding: 7px 10px; outline: none; transition: border-color 0.2s;
    width: 100%;
  }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--muted); opacity: 0.6; }

  .btn {
    padding: 9px 16px; border-radius: 6px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; transition: all 0.15s; width: 100%;
  }
  .btn-connect { background: var(--accent); color: #fff; }
  .btn-connect:hover { opacity: 0.88; }
  .btn-connect:active { transform: scale(0.98); }
  .btn-disconnect { background: var(--bg3); color: var(--red); border: 1px solid var(--border); }
  .btn-disconnect:hover { border-color: var(--red); }

  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-card {
    background: var(--bg3); border-radius: 6px; padding: 10px 12px;
    border: 1px solid var(--border);
  }
  .stat-card .val { font-family: var(--mono); font-size: 18px; font-weight: 600; color: var(--text); }
  .stat-card .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .main { display: flex; flex-direction: column; overflow: hidden; }

  .toolbar {
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; background: var(--bg2);
  }
  .toolbar input {
    flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: var(--mono); font-size: 12px;
    padding: 6px 10px; outline: none;
  }
  .toolbar input:focus { border-color: var(--accent); }
  .clear-btn {
    padding: 6px 12px; border-radius: 6px; background: var(--bg3); border: 1px solid var(--border);
    color: var(--muted); font-size: 12px; cursor: pointer;
  }
  .clear-btn:hover { color: var(--text); border-color: var(--text); }

  .tree-wrap { flex: 1; overflow-y: auto; padding: 8px 0; }
  .tree-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--muted); gap: 10px; font-size: 13px;
  }
  .tree-empty .icon { font-size: 32px; opacity: 0.3; }

  .topic-node { font-family: var(--mono); font-size: 12px; }
  .topic-row {
    display: flex; align-items: center; gap: 0; padding: 3px 16px;
    cursor: pointer; transition: background 0.1s; user-select: none;
  }
  .topic-row:hover { background: var(--bg3); }
  .topic-row.has-value:hover { background: rgba(79,158,255,0.07); }
  .indent { display: inline-block; width: 16px; flex-shrink: 0; }
  .caret {
    width: 14px; flex-shrink: 0; color: var(--muted); font-size: 10px;
    transition: transform 0.15s; display: inline-flex; align-items: center;
  }
  .caret.open { transform: rotate(90deg); }
  .caret.leaf { opacity: 0; pointer-events: none; }
  .topic-seg { color: var(--text); }
  .topic-seg.leaf-seg { color: var(--accent); }
  .topic-count {
    margin-left: 6px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 1px 6px; font-size: 10px; color: var(--muted);
  }
  .topic-value {
    margin-left: auto; max-width: 220px; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; color: var(--green); font-size: 11px; padding-left: 8px;
  }
  .topic-age { margin-left: 8px; color: var(--muted); font-size: 10px; flex-shrink: 0; }
  .topic-new { animation: flashNew 1s ease-out forwards; }
  @keyframes flashNew { 0%{background:rgba(79,158,255,0.18)} 100%{background:transparent} }

  .log-panel {
    height: 180px; border-top: 1px solid var(--border);
    background: var(--bg); display: flex; flex-direction: column;
  }
  .log-header {
    padding: 6px 16px; font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .log-entries { flex: 1; overflow-y: auto; padding: 4px 0; }
  .log-entry {
    display: flex; gap: 10px; padding: 2px 16px; font-family: var(--mono);
    font-size: 11px; line-height: 1.6;
  }
  .log-entry .ts { color: var(--muted); flex-shrink: 0; }
  .log-entry .msg { color: var(--text); word-break: break-all; }
  .log-entry.info .msg { color: var(--text); }
  .log-entry.success .msg { color: var(--green); }
  .log-entry.warn .msg { color: var(--amber); }
  .log-entry.err .msg { color: var(--red); }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="logo">MQTT<span>/monitor</span></div>
  <div class="status-pill" id="statusPill">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">disconnected</span>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div>
      <div class="section-label">Broker</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <div class="field">
          <label>Host</label>
          <input id="host" type="text" placeholder="your-cluster.s1.eu.hivemq.cloud" />
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div class="field">
            <label>Port</label>
            <input id="port" type="number" value="8884" />
          </div>
          <div class="field">
            <label>Protocol</label>
            <input id="proto" type="text" value="wss" />
          </div>
        </div>
        <div class="field">
          <label>Username</label>
          <input id="username" type="text" placeholder="your-username" />
        </div>
        <div class="field">
          <label>Password</label>
          <input id="password" type="password" placeholder="your-password" />
        </div>
        <div class="field">
          <label>Client ID</label>
          <input id="clientId" type="text" id="clientId" />
        </div>
      </div>
    </div>

    <div>
      <div class="section-label">Subscription</div>
      <div class="field">
        <label>Topic filter</label>
        <input id="topicFilter" type="text" value="#" placeholder="#" />
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn btn-connect" id="connectBtn" onclick="toggleConnect()">Connect</button>
    </div>

    <div>
      <div class="section-label">Stats</div>
      <div class="stats-row">
        <div class="stat-card">
          <div class="val" id="statTopics">0</div>
          <div class="lbl">unique topics</div>
        </div>
        <div class="stat-card">
          <div class="val" id="statMsgs">0</div>
          <div class="lbl">messages</div>
        </div>
        <div class="stat-card">
          <div class="val" id="statRate">0</div>
          <div class="lbl">msg/sec</div>
        </div>
        <div class="stat-card">
          <div class="val" id="statBytes">0</div>
          <div class="lbl">bytes rx</div>
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="toolbar">
      <input id="filterInput" type="text" placeholder="Filter topics..." oninput="renderTree()" />
      <button class="clear-btn" onclick="clearTree()">Clear</button>
      <button class="clear-btn" onclick="collapseAll()">Collapse all</button>
    </div>
    <div class="tree-wrap" id="treeWrap">
      <div class="tree-empty" id="treeEmpty">
        <div class="icon">⌁</div>
        <div>No messages yet</div>
        <div style="font-size:11px;opacity:0.6">Connect to a broker to see the topic tree</div>
      </div>
    </div>
    <div class="log-panel">
      <div class="log-header">
        <span>Log</span>
        <button class="clear-btn" style="padding:2px 8px;font-size:10px;" onclick="clearLog()">clear</button>
      </div>
      <div class="log-entries" id="logEntries"></div>
    </div>
  </div>
</div>

<script>
let client = null;
let connected = false;
let topicData = {};
let collapsed = {};
let msgCount = 0;
let bytesRx = 0;
let rateWindow = [];
let renderPending = false;

document.getElementById('clientId').value = 'mqtt-monitor-' + Math.random().toString(36).slice(2, 8);

function setStatus(state, text) {
  const pill = document.getElementById('statusPill');
  const dot = document.getElementById('statusDot');
  const t = document.getElementById('statusText');
  pill.className = 'status-pill ' + state;
  dot.className = 'dot' + (state === 'connecting' ? ' pulse' : '');
  t.textContent = text;
}

function log(msg, type = 'info') {
  const el = document.getElementById('logEntries');
  const ts = new Date().toTimeString().slice(0, 8);
  const row = document.createElement('div');
  row.className = 'log-entry ' + type;
  row.innerHTML = `<span class="ts">${ts}</span><span class="msg">${escHtml(msg)}</span>`;
  el.appendChild(row);
  el.scrollTop = el.scrollHeight;
  if (el.children.length > 200) el.removeChild(el.firstChild);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleConnect() {
  if (connected || client) {
    disconnect();
  } else {
    connect();
  }
}

function connect() {
  const host = document.getElementById('host').value.trim();
  const port = parseInt(document.getElementById('port').value) || 8884;
  const proto = document.getElementById('proto').value.trim() || 'wss';
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const clientId = document.getElementById('clientId').value.trim();

  if (!host) { log('Host is required', 'err'); return; }

  const url = `${proto}://${host}:${port}/mqtt`;
  log(`Connecting to ${url} …`, 'info');
  setStatus('connecting', 'connecting…');

  const opts = { clientId, clean: true, reconnectPeriod: 0 };
  if (username) opts.username = username;
  if (password) opts.password = password;

  try {
    client = mqtt.connect(url, opts);
  } catch(e) {
    log('Failed to init client: ' + e.message, 'err');
    setStatus('error', 'error');
    client = null;
    return;
  }

  document.getElementById('connectBtn').textContent = 'Connecting…';
  document.getElementById('connectBtn').disabled = true;

  client.on('connect', () => {
    connected = true;
    setStatus('connected', 'connected');
    document.getElementById('connectBtn').textContent = 'Disconnect';
    document.getElementById('connectBtn').className = 'btn btn-disconnect';
    document.getElementById('connectBtn').disabled = false;
    const filter = document.getElementById('topicFilter').value.trim() || '#';
    client.subscribe(filter, { qos: 0 }, (err) => {
      if (err) log('Subscribe error: ' + err.message, 'err');
      else log(`Subscribed to "${filter}"`, 'success');
    });
    log('Connected', 'success');
  });

  client.on('message', (topic, payload) => {
    const raw = payload.toString();
    bytesRx += payload.length;
    msgCount++;
    rateWindow.push(Date.now());
    storeTopic(topic, raw);
    scheduleRender();
  });

  client.on('error', (err) => {
    log('Error: ' + err.message, 'err');
    setStatus('error', 'error');
    resetBtn();
    client = null;
    connected = false;
  });

  client.on('close', () => {
    if (connected) log('Connection closed', 'warn');
    connected = false;
    setStatus('', 'disconnected');
    resetBtn();
    client = null;
  });

  client.on('offline', () => {
    log('Broker unreachable', 'warn');
    setStatus('error', 'offline');
  });
}

function disconnect() {
  if (client) {
    client.end(true);
    client = null;
  }
  connected = false;
  setStatus('', 'disconnected');
  resetBtn();
  log('Disconnected', 'warn');
}

function resetBtn() {
  const b = document.getElementById('connectBtn');
  b.textContent = 'Connect';
  b.className = 'btn btn-connect';
  b.disabled = false;
}

function storeTopic(topic, value) {
  const parts = topic.split('/');
  let node = topicData;
  for (let i = 0; i < parts.length; i++) {
    const p = parts[i];
    if (!node[p]) node[p] = { _children: {}, _value: null, _ts: null, _count: 0, _isNew: false };
    if (i === parts.length - 1) {
      node[p]._value = value;
      node[p]._ts = Date.now();
      node[p]._count++;
      node[p]._isNew = true;
      setTimeout(() => { node[p]._isNew = false; }, 800);
    }
    node = node[p]._children;
  }
}

function scheduleRender() {
  if (!renderPending) {
    renderPending = true;
    requestAnimationFrame(() => { renderPending = false; renderTree(); updateStats(); });
  }
}

function updateStats() {
  const now = Date.now();
  rateWindow = rateWindow.filter(t => now - t < 1000);
  document.getElementById('statTopics').textContent = countTopics(topicData);
  document.getElementById('statMsgs').textContent = msgCount;
  document.getElementById('statRate').textContent = rateWindow.length;
  document.getElementById('statBytes').textContent = formatBytes(bytesRx);
}

function countTopics(node) {
  let c = 0;
  for (const k in node) {
    if (node[k]._value !== null) c++;
    c += countTopics(node[k]._children);
  }
  return c;
}

function formatBytes(b) {
  if (b < 1024) return b + 'B';
  if (b < 1048576) return (b/1024).toFixed(1) + 'K';
  return (b/1048576).toFixed(1) + 'M';
}

function renderTree() {
  const filter = document.getElementById('filterInput').value.trim().toLowerCase();
  const wrap = document.getElementById('treeWrap');
  const empty = document.getElementById('treeEmpty');

  if (Object.keys(topicData).length === 0) {
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  const frag = document.createDocumentFragment();
  buildNodes(topicData, frag, 0, '', filter);
  wrap.innerHTML = '';
  wrap.appendChild(frag);
  wrap.appendChild(empty);
}

function buildNodes(node, container, depth, pathPrefix, filter) {
  const keys = Object.keys(node).sort();
  for (const key of keys) {
    const n = node[key];
    const path = pathPrefix ? pathPrefix + '/' + key : key;
    const hasChildren = Object.keys(n._children).length > 0;
    const isLeaf = !hasChildren;
    const isOpen = collapsed[path] !== false;

    if (filter) {
      if (!pathMatchesFilter(path, n._children, filter)) continue;
    }

    const row = document.createElement('div');
    row.className = 'topic-row' + (isLeaf ? ' has-value' : '') + (n._isNew ? ' topic-new' : '');
    row.dataset.path = path;

    let html = '';
    for (let i = 0; i < depth; i++) html += '<span class="indent"></span>';
    html += `<span class="caret ${isLeaf ? 'leaf' : (isOpen ? 'open' : '')}">▶</span>`;
    html += `<span class="topic-seg ${isLeaf ? 'leaf-seg' : ''}">${escHtml(key)}</span>`;

    if (!isLeaf) {
      const childCount = countLeafsUnder(n._children);
      html += `<span class="topic-count">${childCount}</span>`;
    }

    if (isLeaf && n._value !== null) {
      const display = n._value.length > 60 ? n._value.slice(0, 60) + '…' : n._value;
      html += `<span class="topic-value">${escHtml(display)}</span>`;
      html += `<span class="topic-age">${timeAgo(n._ts)}</span>`;
    }

    row.innerHTML = html;
    if (!isLeaf) {
      row.addEventListener('click', () => {
        collapsed[path] = collapsed[path] === false ? true : false;
        renderTree();
      });
    } else {
      row.addEventListener('click', () => {
        showPayload(path, n._value, n._count, n._ts);
      });
    }

    container.appendChild(row);

    if (!isLeaf && isOpen) {
      buildNodes(n._children, container, depth + 1, path, filter);
    }
  }
}

function countLeafsUnder(node) {
  let c = 0;
  for (const k in node) {
    if (node[k]._value !== null) c++;
    c += countLeafsUnder(node[k]._children);
  }
  return c;
}

function pathMatchesFilter(path, children, filter) {
  if (path.toLowerCase().includes(filter)) return true;
  for (const k in children) {
    if (pathMatchesFilter(path + '/' + k, children[k]._children, filter)) return true;
  }
  return false;
}

function timeAgo(ts) {
  if (!ts) return '';
  const d = (Date.now() - ts) / 1000;
  if (d < 5) return 'now';
  if (d < 60) return Math.floor(d) + 's';
  return Math.floor(d / 60) + 'm';
}

function showPayload(topic, value, count, ts) {
  let pretty = value;
  try { pretty = JSON.stringify(JSON.parse(value), null, 2); } catch(e) {}
  log(`[${topic}] (${count} msgs) → ${pretty.slice(0, 300)}`, 'info');
}

function clearTree() {
  topicData = {};
  msgCount = 0; bytesRx = 0; rateWindow = [];
  renderTree();
  updateStats();
}

function clearLog() { document.getElementById('logEntries').innerHTML = ''; }

function collapseAll() {
  function setAll(node, path) {
    for (const k in node) {
      const p = path ? path + '/' + k : k;
      if (Object.keys(node[k]._children).length > 0) collapsed[p] = false;
      setAll(node[k]._children, p);
    }
  }
  setAll(topicData, '');
  renderTree();
}

setInterval(() => { updateStats(); refreshAges(); }, 2000);

function refreshAges() {
  document.querySelectorAll('.topic-age').forEach(el => {
    const row = el.closest('.topic-row');
    if (!row) return;
    const path = row.dataset.path;
    if (!path) return;
    const parts = path.split('/');
    let node = topicData;
    for (const p of parts) { if (!node[p]) return; node = node[p]._children; }
  });
}
</script>
</body>
</html>
