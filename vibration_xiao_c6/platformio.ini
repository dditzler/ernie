[platformio]
default_envs = xiao_c6_vibration

; ============================================================
;  VIBRATION SENSOR — Seeed Studio XIAO ESP32-C6
;  SW420 vibration sensor → detects HVAC on/off
;  Sends state changes to WROOM-32 hub via ESP-NOW
;  Deep sleeps between samples to conserve battery
;
;  NOTE: SW420 is a simple threshold sensor (digital HIGH/LOW).
;  When ADXL345 accelerometers arrive, swap in the richer
;  vibration signature for bearing wear detection.
; ============================================================
[env:xiao_c6_vibration]
platform      = espressif32
board         = esp32-c6-devkitc-1
framework     = arduino
monitor_speed = 115200
upload_port   = /dev/cu.usbmodem1301
monitor_port  = /dev/cu.usbmodem1301
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; -DDEBUG_NO_SLEEP  ; uncomment to disable deep sleep for bench testing
    -DOTA_GITHUB_USER=\"dditzler\"
    -DOTA_GITHUB_REPO=\"ernie\"
    -DOTA_VERSION_PATH=\"/dditzler/ernie/main/sensor-c6-version.json\"
    -DOTA_CHECK_INTERVAL_S=3600

lib_deps =
    https://github.com/sparkfun/SparkFun_ADXL345_Arduino_Library
    arduino-libraries/ArduinoHttpClient @ ^0.6.1
